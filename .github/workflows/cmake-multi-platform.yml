name: VibeOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibeos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build-test:
    name: Linux ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ninja-build build-essential clang ovmf xorriso

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.compiler }}
          -DVIBEOS_BUILD_TESTS=ON
          -DVIBEOS_BUILD_KERNEL_IMAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Host Tests
        run: ctest --test-dir build --output-on-failure

      - name: Build Boot Artifacts
        run: cmake --build build --target vibeos_image

      # The bootable image (bootloader.efi -> objcopy PE) is only boot-verified
      # for the GCC toolchain. Clang builds still validate that all code compiles
      # and passes host tests; the Clang EFI-conversion path is a known TODO and
      # its image is not boot-gated. See docs/implementation_progress/bootloader.md.
      - name: QEMU OVMF Smoke (Required Gate, GCC image)
        if: matrix.compiler == 'gcc'
        timeout-minutes: 4
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-smoke-ovmf-linux.sh
          ./scripts/qemu-smoke-ovmf-linux.sh build "BOOT_OK" 60

      - name: QEMU Boot-to-CLI Smoke (Required Gate, GCC image)
        if: matrix.compiler == 'gcc'
        timeout-minutes: 3
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-smoke-cli-linux.sh
          ./scripts/qemu-smoke-cli-linux.sh build 90

      # Non-blocking until the .iso path is confirmed green on the runner
      # (xorriso is not available locally to pre-verify). The esp/.vdi/.vmdk
      # images are verified in QEMU locally; the .iso is exercised here.
      - name: Build Importable VM Images (esp.img/.vdi/.vmdk/.iso, GCC)
        if: matrix.compiler == 'gcc'
        continue-on-error: true
        run: |
          set -euo pipefail
          chmod +x scripts/make-vm-images-linux.sh
          ./scripts/make-vm-images-linux.sh build

      - name: QEMU Boot-Test Generated ISO (GCC, informational)
        if: matrix.compiler == 'gcc'
        continue-on-error: true
        timeout-minutes: 3
        run: |
          set -euo pipefail
          python3 scripts/qemu-boot-image-linux.py build/artifacts/vibeos.iso BOOT_OK 90 cdrom raw

      - name: QEMU OVMF Summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f qemu-ovmf-summary.txt ]]; then
            cat qemu-ovmf-summary.txt
            status="$(grep '^status=' qemu-ovmf-summary.txt | cut -d= -f2- || true)"
            reason="$(grep '^reason=' qemu-ovmf-summary.txt | cut -d= -f2- || true)"
            profile="$(grep '^profile_used=' qemu-ovmf-summary.txt | cut -d= -f2- || true)"
            phase="$(grep '^last_boot_phase=' qemu-ovmf-summary.txt | cut -d= -f2- || true)"
            echo "OVMF status=${status} reason=${reason} profile=${profile} phase=${phase}"
          fi

      - name: QEMU Direct-Loader Probe (Informational)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-smoke-linux.sh
          ./scripts/qemu-smoke-linux.sh build

      - name: Upload Linux Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.compiler }}-${{ matrix.build_type }}-artifacts
          path: |
            build/artifacts/**
            build/artifacts/vibeos_esp.img
            build/artifacts/vibeos.vdi
            build/artifacts/vibeos.vmdk
            build/artifacts/vibeos.iso
            build/Testing/**/Test.xml
            qemu-serial-*.log
            qemu-err-*.log
            qemu-ovmf-serial-*.log
            qemu-ovmf-err-*.log
            qemu-ovmf-serial.log
            qemu-ovmf-err.log
            qemu-ovmf-summary.txt
            qemu-cli-serial.log
            qemu-cli-err.log
            qemu-cli-summary.txt
            qemu-smoke-summary.txt
          if-no-files-found: warn

  windows-build-test:
    name: Windows Host Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PowerShell Test Pipeline
        shell: pwsh
        run: |
          ./scripts/run-tests.ps1 -BuildDir build -Generator Ninja -Profile ci

      - name: Upload Windows Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-host-artifacts
          path: |
            artifacts/**
            build/artifacts/**
          if-no-files-found: warn
