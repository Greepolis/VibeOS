name: VibeOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibeos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build-test:
    name: Linux ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ninja-build build-essential clang ovmf

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.compiler }}
          -DVIBEOS_BUILD_TESTS=ON
          -DVIBEOS_BUILD_KERNEL_IMAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Host Tests
        run: ctest --test-dir build --output-on-failure

      - name: Build Boot Artifacts
        run: cmake --build build --target vibeos_image

      - name: QEMU OVMF Smoke (Required Gate)
        timeout-minutes: 3
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-smoke-ovmf-linux.sh
          ./scripts/qemu-smoke-ovmf-linux.sh build "BOOT_OK"

      - name: QEMU Direct-Loader Probe (Informational)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          set -euo pipefail
          chmod +x scripts/qemu-smoke-linux.sh
          ./scripts/qemu-smoke-linux.sh build

      - name: Upload Linux Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.compiler }}-${{ matrix.build_type }}-artifacts
          path: |
            build/artifacts/**
            build/Testing/**/Test.xml
            qemu-serial-*.log
            qemu-err-*.log
            qemu-ovmf-serial.log
            qemu-ovmf-err.log
            qemu-ovmf-summary.txt
            qemu-smoke-summary.txt
          if-no-files-found: warn

  windows-build-test:
    name: Windows Host Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PowerShell Test Pipeline
        shell: pwsh
        run: |
          ./scripts/run-tests.ps1 -BuildDir build -Generator Ninja -Profile ci

      - name: Upload Windows Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-host-artifacts
          path: |
            artifacts/**
            build/artifacts/**
          if-no-files-found: warn
